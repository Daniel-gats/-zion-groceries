<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Zion Groceries</title>
    <meta http-equiv="refresh" content="4;url=index.html">
    <style>
        :root {
            --bg: #f6f1e7;
            --card: #fffdf8;
            --ink: #17311f;
            --muted: #5d6d60;
            --accent: #2f8f4e;
            --accent-dark: #1f6b39;
            --line: rgba(23, 49, 31, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Poppins, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(47, 143, 78, 0.14), transparent 30%),
                radial-gradient(circle at bottom right, rgba(244, 177, 66, 0.18), transparent 28%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(100%, 560px);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 28px 60px rgba(23, 49, 31, 0.12);
            text-align: center;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(47, 143, 78, 0.1);
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        h1 {
            margin: 18px 0 12px;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1;
        }
        p {
            margin: 0 auto 20px;
            max-width: 40ch;
            color: var(--muted);
            line-height: 1.6;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-secondary {
            border: 1px solid var(--line);
            color: var(--ink);
            background: #fff;
        }
        .hint {
            margin-top: 18px;
            font-size: 14px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">Scan to Shop</div>
        <h1>Zion Groceries</h1>
        <p>Fresh vegetables, fruits, bakery, staples and more. You are being redirected to the live shop now.</p>
        <div class="actions">
            <a class="btn btn-primary" href="index.html">Open Shop</a>
            <a class="btn btn-secondary" href="https://wa.me/254745562238">Chat on WhatsApp</a>
        </div>
        <div class="hint">This QR can stay the same even after the Android app is ready. I can later point this page to the app instead of the web shop.</div>
    </main>
</body>
</html>
